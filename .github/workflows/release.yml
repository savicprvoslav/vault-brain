name: Release

# Cut a release by pushing a version tag (e.g. `git tag 0.1.2 && git push origin 0.1.2`).
# The assets are built in CI and signed with GitHub build-provenance attestations, so anyone
# can verify them against this source:  gh attestation verify main.js --repo savicprvoslav/vault-brain
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write # create the GitHub release
  id-token: write # OIDC token for attestation signing
  attestations: write # write the build-provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release with attested assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Vault Brain ${GITHUB_REF_NAME}" \
            --notes "Built and signed in CI with GitHub artifact attestations. See CHANGELOG.md for changes." \
            main.js manifest.json styles.css
