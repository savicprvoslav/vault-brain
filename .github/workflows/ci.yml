name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Validate Node-24 action behavior before GitHub's forced default (June 16, 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test
